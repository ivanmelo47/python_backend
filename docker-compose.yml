services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: python_backend:latest
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      APP_NAME: ${APP_NAME:-Python Backend API}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: ${DEBUG:-true}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Mexico_City}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      JWT_REFRESH_TOKEN_EXPIRE_MINUTES: ${JWT_REFRESH_TOKEN_EXPIRE_MINUTES:-70}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DB_SCHEME: ${DB_SCHEME:-mariadb+mariadbconnector}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-python_backend}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      DB_TIMEZONE: ${DB_TIMEZONE:--06:00}
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_SCHEME: ${MAIL_SCHEME:-smtp}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Python Backend API}
      APP_PORT: ${APP_PORT:-8000}
    volumes:
      - ./:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port ${APP_PORT:-8000} --reload
    networks:
      - shared_services_network

networks:
  shared_services_network:
    external: true
    name: ${DOCKER_NETWORK_NAME:-shared_services_network}
